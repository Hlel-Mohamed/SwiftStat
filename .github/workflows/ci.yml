name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # Build smoke check only — deployment is handled by Vercel, which builds
      # from the repo itself. No BASE_PATH here: Vercel serves at the domain
      # root, so `base` must stay '/' (see vite.config.js).
      - run: npm run build
